version: "0.1"
kind: "adl-skill"
id: "repo-code-review"
codex_compat:
  skill_file: "SKILL.md"
  trigger_frontmatter:
    - "name"
    - "description"
admission:
  input_schema:
    id: "repo_code_review.v1"
    reference_doc: "/Users/daniel/git/agent-design-language/adl/tools/skills/docs/REPO_CODE_REVIEW_SKILL_INPUT_SCHEMA.md"
    required_top_level_fields:
      - "skill_input_schema"
      - "mode"
      - "repo_root"
      - "target"
      - "policy"
    mode_enum:
      - "review_repository"
      - "review_path"
      - "review_branch"
      - "review_diff"
    policy_fields:
      - "review_depth"
      - "include_generated_code"
      - "write_review_artifact"
      - "stop_after_review"
    mode_requirements:
      review_repository:
        required_target_fields: []
      review_path:
        required_target_fields:
          - "target_path"
      review_branch:
        required_target_fields:
          - "branch"
      review_diff:
        required_target_fields:
          - "diff_base"
  intent:
    - "repo_review"
    - "risk_assessment"
    - "release_readiness_review"
  required_inputs:
    - "repo_root"
  optional_inputs:
    - "target_path"
    - "branch"
    - "diff_base"
    - "changed_paths"
    - "review_depth"
    - "include_generated_code"
    - "write_review_artifact"
  stop_if_missing:
    - "repo_root"
  prevalidation_rules:
    - "repo_root_must_be_absolute"
    - "skill_input_schema_must_equal_repo_code_review.v1_when_structured_input_is_used"
    - "mode_must_match_supported_enum"
    - "review_path_requires_target.target_path"
    - "review_branch_requires_target.branch"
    - "review_diff_requires_target.diff_base"
    - "target.changed_paths_must_be_a_path_list_when_present"
    - "policy.review_depth_must_be_explicit"
    - "policy.stop_after_review_must_be_true"
execution:
  mode: "findings_only"
  allow_code_edits: false
  allow_network: false
  allow_subagents: true
  test_policy: "run_targeted_local_tests_when_bounded"
  docs_policy: "docs_support_code_review_but_do_not_dominate_when_executable_code_exists"
  config_policy: "always_review_manifests_dependency_build_toolchain_ci_and_lockfile_surfaces"
  permitted_scripts:
    - path: "scripts/repo_inventory.py"
      interpreter: "python3"
      read_only: true
      allowed_args:
        - "<repo-root>"
  preferred_read_order:
    - "top_level_manifests"
    - "dependency_and_build_config"
    - "entrypoints"
    - "core_runtime"
    - "largest_code_files"
    - "stateful_or_security_sensitive_code"
    - "tests"
  invocation_guidance: "prefer_validated_structured_input_over_freeform_prose"
boundaries:
  ignore_by_default:
    - "node_modules/**"
    - ".git/**"
    - "dist/**"
    - "build/**"
    - "target/**"
    - "coverage/**"
  review_generated_code_only_if_requested: true
outputs:
  default_format: "markdown"
  structured_contract: "references/output-contract.md"
  artifact_path_pattern: ".adl/reviews/<timestamp>-repo-review.md"
  required_sections:
    - "findings"
    - "assumptions"
    - "coverage_summary"
    - "validation_performed"
    - "manifest_and_config_reviewed"
security:
  trusted_root_required: true
  deny_symlink_escape: true
  manifest_declares_executables: true
