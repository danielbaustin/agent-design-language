version: "0.1"
kind: "adl-skill"
id: "pr-run"
codex_compat:
  skill_file: "SKILL.md"
  trigger_frontmatter:
    - "name"
    - "description"
admission:
  input_schema:
    id: "pr_run.v1"
    reference_doc: "/Users/daniel/git/agent-design-language/adl/tools/skills/docs/PR_RUN_SKILL_INPUT_SCHEMA.md"
    required_top_level_fields:
      - "skill_input_schema"
      - "mode"
      - "repo_root"
      - "target"
      - "policy"
    mode_enum:
      - "run_issue"
      - "run_task_bundle"
      - "run_branch"
      - "run_worktree"
    policy_fields:
      - "require_doctor_check"
      - "allow_preflight_override"
      - "allow_binding_create"
      - "allow_binding_reuse"
      - "validation_mode"
      - "stop_after_execution"
    mode_requirements:
      run_issue:
        required_target_fields:
          - "issue_number"
      run_task_bundle:
        required_target_fields:
          - "task_bundle_path"
      run_branch:
        required_target_fields:
          - "branch"
      run_worktree:
        required_target_fields:
          - "worktree_path"
  intent:
    - "issue_execution"
    - "branch_worktree_binding"
    - "workflow_run"
  required_inputs:
    - "repo_root"
  optional_inputs:
    - "issue_number"
    - "task_bundle_path"
    - "branch"
    - "worktree_path"
    - "slug"
    - "version"
    - "source_prompt_path"
    - "stp_path"
    - "sip_path"
    - "sor_path"
    - "doctor_result"
    - "execution_override_allowed"
  stop_if_missing:
    - "repo_root"
  require_one_of:
    - "issue_number"
    - "task_bundle_path"
    - "branch"
    - "worktree_path"
  prevalidation_rules:
    - "repo_root_must_be_absolute"
    - "skill_input_schema_must_equal_pr_run.v1_when_structured_input_is_used"
    - "mode_must_match_supported_enum"
    - "exactly_one_primary_target_should_drive_the_mode"
    - "policy.stop_after_execution_must_be_true"
    - "policy.validation_mode_must_be_explicit"
    - "at_least_one_binding_policy_must_be_true"
    - "paths_must_identify_only_one_intended_execution_target_context"
execution:
  mode: "auto_apply"
  allow_code_edits: true
  allow_network: true
  allow_subagents: true
  parallelism_policy: "parallel_across_distinct_issues_only"
  workflow_role: "execution"
  stop_before:
    - "pr_janitor"
    - "pr_finish"
    - "merge"
    - "closeout"
  preferred_commands:
    - "adl/tools/pr.sh doctor --json"
    - "adl pr doctor --json"
    - "adl/tools/pr.sh run"
    - "adl pr run"
    - "adl/tools/pr.sh ready"
    - "adl/tools/pr.sh preflight"
    - "adl pr ready"
    - "adl pr preflight"
  preferred_path: "consume_doctor_json_first_then_run_with_compatibility_fallbacks"
  repair_policy: "doctor_checks_must_precede_execution_and_issue_scope_must_remain_bounded"
  invocation_guidance: "prefer_validated_structured_input_over_freeform_prose"
boundaries:
  writes_limited_to:
    - "issue-scoped repository files"
    - ".adl/**"
    - "issue worktree surfaces"
  must_not_write:
    - "unrelated issue worktrees"
    - "unrelated task bundles"
  stop_on_partial_failure: true
outputs:
  default_format: "markdown"
  structured_contract: "references/output-contract.md"
  artifact_path_pattern: ".adl/reviews/<timestamp>-pr-run.md"
  required_sections:
    - "status"
    - "target"
    - "binding_state"
    - "materialization_state"
    - "actions_taken"
    - "validation_performed"
    - "handoff_state"
security:
  trusted_root_required: true
  deny_symlink_escape: true
  manifest_declares_executables: false
