version: "0.1"
kind: "adl-skill"
id: "workflow-conductor"
codex_compat:
  skill_file: "SKILL.md"
  trigger_frontmatter:
    - "name"
    - "description"
admission:
  input_schema:
    id: "workflow_conductor.v1"
    reference_doc: "../docs/WORKFLOW_CONDUCTOR_SKILL_INPUT_SCHEMA.md"
    required_top_level_fields:
      - "skill_input_schema"
      - "mode"
      - "repo_root"
      - "target"
      - "policy"
    mode_enum:
      - "route_issue"
      - "route_task_bundle"
      - "route_branch"
      - "route_worktree"
      - "route_pr"
    policy_fields:
      - "skills_required"
      - "card_editor_skills_required"
      - "subagent_requirement"
      - "bypass_without_explicit_blocker"
      - "allow_phase_inference"
      - "stop_after_routing"
    mode_requirements:
      route_issue:
        required_target_fields:
          - "issue_number"
      route_task_bundle:
        required_target_fields:
          - "task_bundle_path"
      route_branch:
        required_target_fields:
          - "branch"
      route_worktree:
        required_target_fields:
          - "worktree_path"
      route_pr:
        required_target_fields:
          - "pr_number"
  intent:
    - "workflow_routing"
    - "skill_orchestration"
    - "policy_compliance"
  required_inputs:
    - "repo_root"
  optional_inputs:
    - "issue_number"
    - "task_bundle_path"
    - "branch"
    - "worktree_path"
    - "pr_number"
    - "observed_state.subagent_assigned"
    - "slug"
    - "version"
    - "doctor_result"
    - "source_prompt_path"
    - "stp_path"
    - "sip_path"
    - "sor_path"
    - "pr_state"
    - "stop_boundary"
    - "dispatch"
  stop_if_missing:
    - "repo_root"
  require_one_of:
    - "issue_number"
    - "task_bundle_path"
    - "branch"
    - "worktree_path"
    - "pr_number"
  prevalidation_rules:
    - "repo_root_must_be_absolute"
    - "skill_input_schema_must_equal_workflow_conductor.v1_when_structured_input_is_used"
    - "mode_must_match_supported_enum"
    - "exactly_one_primary_target_should_drive_the_mode"
    - "policy.stop_after_routing_must_be_true"
    - "policy.subagent_requirement_must_be_explicit"
    - "policy.allow_phase_inference_must_be_explicit"
execution:
  mode: "route_and_dispatch_bounded_subtasks"
  allow_code_edits: false
  allow_network: true
  allow_subagents: true
  workflow_role: "conductor"
  preferred_commands:
    - "python3 adl/tools/skills/workflow-conductor/scripts/route_workflow.py --input <validated-json>"
    - "python3 adl/tools/skills/workflow-conductor/scripts/select_next_skill.py"
    - "adl/tools/open_artifact.sh"
  preferred_path: "inspect_state_then_route_and_optionally_dispatch_one_bounded_downstream_skill"
  invocation_guidance: "prefer_validated_structured_input_over_freeform_prose"
boundaries:
  writes_limited_to:
    - ".adl/**"
    - "skill-routing review artifacts"
  must_not_write:
    - "implementation source files"
    - "unrelated task bundles"
  stop_on_partial_failure: true
outputs:
  default_format: "markdown"
  structured_contract: "references/output-contract.md"
  artifact_path_pattern: ".adl/reviews/<timestamp>-workflow-conductor.md"
  required_sections:
    - "status"
    - "target"
    - "workflow_state"
    - "selected_skill"
    - "workflow_compliance"
    - "handoff_state"
    - "dispatch"
security:
  trusted_root_required: true
  deny_symlink_escape: true
  manifest_declares_executables: true
