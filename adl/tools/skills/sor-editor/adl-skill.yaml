version: "0.1"
kind: "adl-skill"
id: "sor-editor"
codex_compat:
  skill_file: "SKILL.md"
  trigger_frontmatter:
    - "name"
    - "description"
admission:
  input_schema:
    id: "sor_editor.v1"
    reference_doc: "/Users/daniel/git/agent-design-language/adl/tools/skills/docs/SOR_EDITOR_SKILL_INPUT_SCHEMA.md"
    required_top_level_fields:
      - "skill_input_schema"
      - "mode"
      - "repo_root"
      - "target"
      - "policy"
    mode_enum:
      - "normalize_sor"
      - "prepare_for_finish"
      - "repair_truth_drift"
  intent:
    - "sor_edit"
    - "output_card_normalization"
    - "finish_truth_repair"
  required_inputs:
    - "repo_root"
    - "sor_path"
  prevalidation_rules:
    - "repo_root_must_be_absolute"
    - "skill_input_schema_must_equal_sor_editor.v1_when_structured_input_is_used"
    - "target.sor_path_must_be_present"
    - "policy.stop_after_edit_must_be_true"
    - "evidence.commands_run_must_be_explicit_when_validation_claims_are_changed"
  execution:
    mode: "auto_apply"
    allow_code_edits: true
    allow_network: false
    allow_subagents: false
    workflow_role: "card_editor"
    preferred_path: "structured_input_then_direct_card_edit"
    invocation_guidance: "prefer_validated_structured_input_over_freeform_prose"
boundaries:
  writes_limited_to:
    - ".adl/**/sor.md"
  must_not_write:
    - ".adl/**/stp.md"
    - ".adl/**/sip.md"
    - "implementation source files"
outputs:
  default_format: "markdown"
  structured_contract: "references/output-contract.md"
security:
  trusted_root_required: true
  deny_symlink_escape: true
