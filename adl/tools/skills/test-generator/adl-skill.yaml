version: "0.1"
kind: "adl-skill"
id: "test-generator"
codex_compat:
  skill_file: "SKILL.md"
  trigger_frontmatter:
    - "name"
    - "description"
admission:
  input_schema:
    id: "test_generator.v1"
    reference_doc: "../docs/TEST_GENERATOR_SKILL_INPUT_SCHEMA.md"
    required_top_level_fields:
      - "skill_input_schema"
      - "mode"
      - "repo_root"
      - "target"
      - "policy"
    mode_enum:
      - "generate_for_issue"
      - "generate_for_diff"
      - "generate_for_path"
      - "generate_for_worktree"
    policy_fields:
      - "test_depth"
      - "allow_new_test_files"
      - "allow_fixture_updates"
      - "validation_mode"
      - "stop_after_generation"
    mode_requirements:
      generate_for_issue:
        required_target_fields:
          - "issue_number"
      generate_for_diff:
        required_target_fields:
          - "diff_base"
      generate_for_path:
        required_target_fields:
          - "target_path"
      generate_for_worktree:
        required_target_fields:
          - "worktree_path"
  intent:
    - "test_generation"
    - "regression_test_backfill"
    - "focused_validation_support"
  required_inputs:
    - "repo_root"
  optional_inputs:
    - "issue_number"
    - "diff_base"
    - "target_path"
    - "worktree_path"
    - "changed_paths"
    - "target_behavior"
    - "acceptance_surface"
    - "test_framework"
    - "validation_mode"
  stop_if_missing:
    - "repo_root"
  prevalidation_rules:
    - "repo_root_must_be_absolute"
    - "skill_input_schema_must_equal_test_generator.v1_when_structured_input_is_used"
    - "mode_must_match_supported_enum"
    - "generate_for_issue_requires_target.issue_number"
    - "generate_for_diff_requires_target.diff_base"
    - "generate_for_path_requires_target.target_path"
    - "generate_for_worktree_requires_target.worktree_path"
    - "target.changed_paths_must_be_a_path_list_when_present"
    - "policy.test_depth_must_be_explicit"
    - "policy.validation_mode_must_be_explicit"
    - "policy.stop_after_generation_must_be_true"
execution:
  mode: "auto_apply"
  allow_code_edits: true
  allow_network: false
  allow_subagents: true
  preferred_read_order:
    - "target_implementation"
    - "nearby_tests"
    - "issue_acceptance_surface"
    - "test_runner_config"
  preferred_commands:
    - "rg --files"
    - "rg -n"
    - "cargo test <target>"
    - "pytest <target>"
    - "npm test -- <pattern>"
  invocation_guidance: "prefer_validated_structured_input_over_freeform_prose"
boundaries:
  writes_limited_to:
    - "test files"
    - "fixtures"
    - "snapshots"
    - "narrowly related test helpers"
    - ".adl/**"
  must_not_write:
    - "unrelated production code"
    - "unrelated issue bundles"
    - "unrelated worktrees"
  stop_on_partial_failure: true
outputs:
  default_format: "markdown"
  structured_contract: "references/output-contract.md"
  artifact_path_pattern: ".adl/reviews/<timestamp>-test-generator.md"
  required_sections:
    - "status"
    - "target"
    - "test_plan"
    - "changes_made"
    - "validation_performed"
    - "residual_risk"
security:
  trusted_root_required: true
  deny_symlink_escape: true
  manifest_declares_executables: false
