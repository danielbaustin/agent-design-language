version: "0.1"
kind: "adl-skill"
id: "sprint-conductor"
codex_compat:
  skill_file: "SKILL.md"
  trigger_frontmatter:
    - "name"
    - "description"
admission:
  input_schema:
    id: "sprint_conductor.v1"
    reference_doc: "../docs/SPRINT_CONDUCTOR_SKILL_INPUT_SCHEMA.md"
    required_top_level_fields:
      - "skill_input_schema"
      - "mode"
      - "repo_root"
      - "sprint"
      - "policy"
    mode_enum:
      - "run_sprint"
      - "resume_sprint"
      - "review_and_closeout_sprint"
    policy_fields:
      - "require_declared_execution_mode"
      - "require_sequential_closeout"
      - "require_sep_for_parallel_or_hybrid"
      - "require_existing_issue_skills"
      - "require_editor_skills"
      - "require_code_review"
      - "allow_create_missing_sprint_issue"
      - "require_full_sprint_structured_prompt_readiness"
      - "allow_review_subagent_exception"
      - "max_review_subagents_when_exception_enabled"
      - "follow_up_issue_policy"
      - "require_github_truth_recheck"
      - "github_truth_gate_blocks_progress"
      - "require_installed_skill_parity_before_live_run"
      - "capture_coverage_at_closeout"
      - "capture_rust_tracker_at_closeout"
      - "stop_on_blocker"
    mode_requirements:
      run_sprint:
        required_sprint_fields:
          - "ordered_issue_numbers"
          - "execution_mode"
          - "goal"
      resume_sprint:
        required_sprint_fields:
          - "ordered_issue_numbers"
          - "execution_mode"
      review_and_closeout_sprint:
        required_sprint_fields:
          - "issue_number"
          - "ordered_issue_numbers"
          - "execution_mode"
  intent:
    - "sprint_orchestration"
    - "declared_issue_wave_coordination"
    - "review_and_closeout"
  required_inputs:
    - "repo_root"
    - "sprint.ordered_issue_numbers"
    - "sprint.execution_mode"
  optional_inputs:
    - "sprint.issue_number"
    - "sprint.goal"
    - "sprint.version"
    - "sprint.slug"
    - "sprint.stop_date"
    - "sprint.current_issue_number"
    - "sprint.completed_issue_numbers"
    - "sprint.blocked_issue_number"
    - "resume_from_state_path"
    - "sprint.review_paths"
    - "sprint.activity_log_paths"
    - "sprint.closeout_paths"
    - "sprint.issue_records"
    - "sprint.execution_packet_path"
    - "sprint.recommended_execution_order"
    - "sprint.candidate_parallel_lanes"
    - "sprint.safe_parallel_lanes"
    - "sprint.serial_gates"
    - "sprint.pvf_notes"
    - "sprint.planned_vs_actual_parallelism"
    - "sprint.follow_up_issues"
    - "sprint.structured_prompt_preflight"
    - "sprint.truth_check"
    - "sprint.installed_skill_parity"
    - "sprint.readiness_sweep"
    - "review_subagent_ids"
  stop_if_missing:
    - "repo_root"
    - "sprint.ordered_issue_numbers"
    - "sprint.execution_mode"
  prevalidation_rules:
    - "repo_root_must_be_absolute"
    - "skill_input_schema_must_equal_sprint_conductor.v1_when_structured_input_is_used"
    - "mode_must_match_supported_enum"
    - "ordered_issue_numbers_must_be_nonempty_and_explicitly_ordered"
    - "policy.require_sequential_closeout_must_be_true"
    - "policy.require_existing_issue_skills_must_be_true"
    - "policy.require_editor_skills_must_be_true"
    - "policy.require_full_sprint_structured_prompt_readiness_must_be_true"
    - "policy.require_github_truth_recheck_must_be_true"
    - "policy.github_truth_gate_blocks_progress_must_be_true"
    - "policy.stop_on_blocker_must_be_true"
    - "policy.follow_up_issue_policy_must_be_explicit"
    - "when_sprint.issue_number_is_missing_policy.allow_create_missing_sprint_issue_must_be_true_or_stop_blocked"
execution:
  mode: "orchestrate_existing_skills_sequentially"
  allow_code_edits: true
  allow_network: true
  allow_subagents: true
  workflow_role: "sprint_orchestrator"
  preferred_commands:
    - "python3 adl/tools/skills/sprint-conductor/scripts/check_sprint_readiness.py --repo-root <repo> --ordered-issues <csv> --execution-mode <sequential|parallel|hybrid> --state <path>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/check_installed_skill_parity.py --repo-root <repo> --state <path>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/check_sprint_structured_prompt_readiness.py --repo-root <repo> --ordered-issues <csv> --state <path>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/create_missing_sprint_issue.py --repo-root <repo> --ordered-issues <csv> --title <title> --goal <descriptive-sprint-objective> --state <path>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/close_sprint_issue.py --state <path> --summary <text>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/check_sprint_truth.py --repo-root <repo> --state <path> --require-match"
    - "python3 adl/tools/skills/sprint-conductor/scripts/check_sprint_closeout_readiness.py --state <path> --out <path> --summary-out <path>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/record_child_issue_closeout.py --state <path> --issue-number <n> --issue-closed true --pr-state <merged|closed_no_merge|not_applicable> --root-sor-status <done|failed> --worktree-status <pruned|retained_with_reason|not_applicable>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/record_issue_goal_stage_artifacts.py --goal-state <saved-get-goal.json> --issue-number <n> --artifacts-dir .adl/<version>/tasks/issue-<n>__<slug>/artifacts/goal_metrics --capture-stage <issue_start|pr_publication|review_handoff|merge_closeout|sprint_closeout> --issue-goal-ref goal:<version>:issue:<n>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/record_issue_goal_metrics.py --state <path> --issue-number <n> --sink <jsonl> --capture-stage <issue_start|pr_publication|review_handoff|merge_closeout|sprint_closeout> --data-source <codex_goal_tool|manual_entry|derived_sprint_state|unknown>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/update_sprint_state.py --state <path> --sprint-issue <n> --ordered-issues <csv>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/write_sprint_closeout_artifact.py --state <path> --out <path>"
    - "python3 adl/tools/skills/sprint-conductor/scripts/validate_review_subagent_policy.py --allow-review-subagent-exception <bool> --max-review-subagents 1"
    - "workflow-conductor for issue routing"
    - "pr-init/pr-ready/pr-run/pr-finish/pr-janitor/pr-closeout for child issue lifecycle"
    - "repo-packet-builder and review specialist skills for sprint-end review"
    - "cargo llvm-cov --workspace --all-features --summary-only"
    - "bash adl/tools/report_large_rust_modules.sh --format tsv"
  preferred_path: "sequential_child_issue_closeout_then_review_then_sprint_closeout"
  invocation_guidance: "prefer_validated_structured_input_over_freeform_prose"
boundaries:
  writes_limited_to:
    - ".adl/**"
    - "sprint review artifacts"
    - "sprint closeout artifacts"
  must_not_write:
    - "tracked implementation source files directly outside the selected child issue lifecycle path"
    - "unrelated issue bundles"
  stop_on_partial_failure: true
outputs:
  default_format: "markdown"
  structured_contract: "references/output-contract.md"
  artifact_path_pattern: ".adl/reviews/<timestamp>-sprint-<issue>-conductor.md"
  required_sections:
    - "status"
    - "sprint"
    - "sequence"
    - "structured_prompt_preflight"
    - "installed_skill_parity"
    - "readiness_sweep"
    - "structured_prompt_preflight"
    - "truth_check"
    - "current_state"
    - "review"
    - "closeout"
    - "actions_taken"
    - "next_handoff"
    - "artifact"
security:
  trusted_root_required: true
  deny_symlink_escape: true
