version: adl.prompt_contract.v1
artifact: structured_task_prompt
description: >
  Machine-checkable contract for authored Structured Task Prompts (STPs).
  In the canonical v0.91.2 lifecycle, STP records the selected task or
  solution after SIP defines issue intent and before SPP records the execution
  plan.
fields:
  issue_card_schema:
    type: enum
    values: [adl.issue.v1]
    required: true
  wp:
    type: string
    required: true
  slug:
    type: slug
    required: true
  title:
    type: string
    required: true
  labels:
    type: string_array
    required: true
    min_items: 1
  issue_number:
    type: integer
    required: true
  status:
    type: enum
    values: [draft, active, complete]
    required: true
  action:
    type: enum
    values: [create, edit, close, split, supersede]
    required: true
  depends_on:
    type: string_array
    required: true
  milestone_sprint:
    type: string
    required: true
  required_outcome_type:
    type: string_array
    required: true
    min_items: 1
  repo_inputs:
    type: string_array
    required: true
  canonical_files:
    type: string_array
    required: true
  demo_required:
    type: boolean
    required: true
  demo_names:
    type: string_array
    required: true
  issue_graph_notes:
    type: string_array
    required: true
  pr_start.enabled:
    type: boolean
    required: true
  pr_start.slug:
    type: slug
    required: true
  lifecycle_stage:
    type: enum
    values: [STP]
    required: false
  activation_state:
    type: enum
    values: [scaffold, draft, active, complete, superseded, legacy_compatible]
    required: false
required_sections:
  - Summary
  - Goal
  - Required Outcome
  - Deliverables
  - Acceptance Criteria
  - Repo Inputs
  - Dependencies
  - Demo Expectations
  - Non-goals
  - Issue-Graph Notes
  - Notes
  - Tooling Notes
phases:
  scaffold:
    notes: >
      File exists or issue body has been mirrored, but selected task truth has
      not been reviewed.
  draft:
    notes: >
      Selected task is being authored or reviewed.
  active:
    notes: >
      STP is the current task/solution source for execution planning.
  complete:
    notes: >
      STP has served its issue and is retained for audit.
  legacy_compatible:
    notes: >
      Historical STP shape remains readable while migration tooling is rolled
      out.
