version: "0.5"

providers:
  chatgpt_local:
    type: "http"
    config:
      endpoint: "http://127.0.0.1:8791/openai"
      timeout_secs: 90
  gemini_local:
    type: "http"
    config:
      endpoint: "http://127.0.0.1:8791/gemini"
      timeout_secs: 90

agents:
  chatgpt_host:
    provider: "chatgpt_local"
    model: "gpt-5.5-demo"
  gemini_guest:
    provider: "gemini_local"
    model: "gemini-2.5-pro-demo"

tasks:
  chatgpt_opening:
    prompt:
      user: |
        DEMO_ID: v0-91-chatgpt-gemini-direct-conversation
        TURN_ID: 01
        SPEAKER: ChatGPT
        TOPIC: What is the smallest honest proof of multi-agent coordination?
        STOP_RULE: Stop after four explicit turns.
        PRIVATE_STATE:
        - You privately know the plan must satisfy a hard deadline and budget ceiling.
        - You do not know the hidden dependency chain or latent risk register.
        - Do not reveal the raw private-state bullets verbatim.
        INSTRUCTIONS: Open warmly but with substance. Make the four-turn stop rule explicit, then propose one strong candidate answer to the topic. Keep the whole turn under 170 words. Your candidate should be concrete, slightly debatable, and grounded in saved traces rather than vague claims about autonomy. End with a one-line `PROVISIONAL_CLAIM:` sentence that Gemini can attack.
  gemini_reply:
    prompt:
      user: |
        DEMO_ID: v0-91-chatgpt-gemini-direct-conversation
        TURN_ID: 02
        SPEAKER: Gemini
        TOPIC: What is the smallest honest proof of multi-agent coordination?
        STOP_RULE: Stop after four explicit turns.
        PRIVATE_STATE:
        - You privately know the dependency chain and a latent risk condition.
        - You do not know the hard deadline or budget ceiling.
        - Do not reveal the raw private-state bullets verbatim.
        PREVIOUS_TURN_START
        {{turn_01}}
        PREVIOUS_TURN_END
        INSTRUCTIONS: Reply directly to ChatGPT, keep identity explicit, and do not just agree. Sharpen or challenge the candidate answer. Explain what would make the proof too weak, and mention why saved artifacts and temporal continuity matter. Keep the whole turn under 190 words. Include a compact block at the end exactly in this form:
        COORDINATION_DELTA:
        - hidden_conflict: ...
        - revision_pressure: ...
        - why_single_agent_fails: ...
  chatgpt_reflection:
    prompt:
      user: |
        DEMO_ID: v0-91-chatgpt-gemini-direct-conversation
        TURN_ID: 03
        SPEAKER: ChatGPT
        TOPIC: What is the smallest honest proof of multi-agent coordination?
        STOP_RULE: Stop after four explicit turns.
        PREVIOUS_TURN_START
        {{turn_02}}
        PREVIOUS_TURN_END
        INSTRUCTIONS: Synthesize the disagreement into a tighter definition. Keep the whole turn under 170 words. You must explicitly say that your revised answer changed because of Gemini-only information. Give exactly one setup sentence followed by exactly three numbered criteria, each one sentence long. Keep the proof boundary explicit without widening into federation, autonomy, or persistent teamwork claims.
  gemini_close:
    prompt:
      user: |
        DEMO_ID: v0-91-chatgpt-gemini-direct-conversation
        TURN_ID: 04
        SPEAKER: Gemini
        TOPIC: What is the smallest honest proof of multi-agent coordination?
        STOP_RULE: Stop after four explicit turns.
        PREVIOUS_TURN_START
        {{turn_03}}
        PREVIOUS_TURN_END
        INSTRUCTIONS: Close the conversation explicitly. Accept or refine the three criteria, add one memorable final sentence about honest proof versus theatrical proof, and then stop exactly on Turn 4. Keep the whole turn under 140 words. Name one reason this run is stronger than decorative baton-passing.

run:
  name: "v0-91-chatgpt-gemini-direct-conversation"
  workflow:
    kind: sequential
    steps:
      - id: "direct.chatgpt.opening"
        agent: "chatgpt_host"
        task: "chatgpt_opening"
        conversation:
          id: "turn_01"
          speaker: "ChatGPT"
          sequence: 1
          thread_id: "chatgpt_gemini_direct"
        save_as: "turn_01"
        write_to: "direct/01-chatgpt-opening.md"
      - id: "direct.gemini.reply"
        agent: "gemini_guest"
        task: "gemini_reply"
        conversation:
          id: "turn_02"
          speaker: "Gemini"
          sequence: 2
          thread_id: "chatgpt_gemini_direct"
          responds_to: "turn_01"
        inputs:
          turn_01: "@state:turn_01"
        save_as: "turn_02"
        write_to: "direct/02-gemini-reply.md"
      - id: "direct.chatgpt.reflection"
        agent: "chatgpt_host"
        task: "chatgpt_reflection"
        conversation:
          id: "turn_03"
          speaker: "ChatGPT"
          sequence: 3
          thread_id: "chatgpt_gemini_direct"
          responds_to: "turn_02"
        inputs:
          turn_02: "@state:turn_02"
        save_as: "turn_03"
        write_to: "direct/03-chatgpt-reflection.md"
      - id: "direct.gemini.close"
        agent: "gemini_guest"
        task: "gemini_close"
        conversation:
          id: "turn_04"
          speaker: "Gemini"
          sequence: 4
          thread_id: "chatgpt_gemini_direct"
          responds_to: "turn_03"
        inputs:
          turn_03: "@state:turn_03"
        save_as: "turn_04"
        write_to: "direct/04-gemini-close.md"
