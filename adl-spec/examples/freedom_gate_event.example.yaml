# Alternative Freedom Gate event example.
# Canonical schema-aligned example: adl-spec/examples/freedom_gate_event.json
# Canonical schema: adl-spec/schemas/freedom_gate_event.yaml

version: "adl_freedom_gate_event.v1"

freedom_gate_event:
  run_id: "run_2026_03_12_001"
  step_id: "deploy_prod_database"

  principal: "planner_agent"
  delegate: "execution_agent"

  decision: "refuse"

  evaluation:
    authority_status: "valid"
    constitutional_status: "violated"
    harm_status: "severe"
    proportionality_status: "insufficient_approval"
    uncertainty_status: "low"

  trigger:
    instruction: "delete production database"
    action_category: "destructive_prod_change"

  violations:
    - code: "CONST_IRREVERSIBLE_DESTRUCTIVE_ACTION"
      severity: "critical"
      summary: "Plan performs irreversible production data deletion without required approvals."

  reasoning_summary:
    irreversible_data_loss_risk: "high"
    contract_violation: true
    constitutional_principle: "proportional_action"

  recommendations:
    - "Create database snapshot before destructive operations."
    - "Request explicit human approval."
    - "Route task through oversight_agent for review."

  escalation_target:
    - "oversight_agent"

  artifact_metadata:
    created_by: "freedom_gate"
    timestamp: "2026-03-12T18:00:00Z"
    artifact_path: ".adl/runs/<run_id>/freedom/freedom_gate_<step_id>.yaml"

  notes: >
    This artifact demonstrates a refusal event generated by the Freedom Gate
    when a delegated instruction violates constitutional proportionality rules
    and lacks the required approvals for irreversible destructive actions.
