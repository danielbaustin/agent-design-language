name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swarm-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: swarm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            swarm -> target

      - name: tooling sanity (bash -n)
        run: bash -n swarm/tools/*.sh
        working-directory: .

      - name: tooling sanity (codex_pr help)
        run: sh swarm/tools/codex_pr.sh --help
        working-directory: .

      - name: tooling sanity (codexw help)
        run: sh swarm/tools/codexw.sh --help
        working-directory: .

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: docs command check
        run: bash tools/check_release_notes_commands.sh

      - name: test
        run: cargo test

  swarm-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: swarm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            swarm -> target

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e5c52b603cc5f5e9b52b6a43afad8e9fe0527090 # cargo-llvm-cov

      - name: Coverage (swarm)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Coverage summary (json)
        run: cargo llvm-cov report --json --summary-only --output-path coverage-summary.json

      - name: Enforce per-file coverage gate (swarm/src >= 80%)
        run: |
          set -eu
          threshold=80
          rows="$(jq -r '
            [.data[].files[]
              | select(.filename|contains("/swarm/src/"))
              | {f:.filename, covered:.summary.lines.covered, count:.summary.lines.count}
            ]
            | sort_by(.f)
            | group_by(.f)[]
            | {
                f: .[0].f,
                covered: (map(.covered) | add),
                count: (map(.count) | add),
                percent: ((map(.covered) | add) * 100.0 / (map(.count) | add))
              }
            | [.f, .covered, .count, .percent]
            | @tsv
          ' coverage-summary.json)"

          if [ -z "$rows" ]; then
            echo "No swarm/src coverage rows found in coverage-summary.json"
            exit 1
          fi

          echo "Per-file line coverage for swarm/src (threshold: ${threshold}%)"
          echo "$rows" | awk -F '\t' '{
            printf "  %s\t%d/%d\t%.2f%%\n", $1, $2, $3, $4
          }'

          echo "$rows" | awk -F '\t' -v threshold="$threshold" '
            BEGIN { bad=0 }
            ($4 + 0) < threshold {
              bad=1
              printf "Coverage below threshold: %s %.2f%% < %s%%\n", $1, $4, threshold
            }
            END { exit bad }
          '

      - name: Verify generated lcov file
        run: test -s lcov.info && ls -l lcov.info

      - name: Verify lcov path from repository root
        run: test -s swarm/lcov.info && ls -l swarm/lcov.info
        working-directory: .

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: swarm-coverage-lcov
          path: |
            swarm/lcov.info
            swarm/coverage-summary.json
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: swarm/lcov.info
          flags: swarm
          # Keep CI signal stable during transient Codecov outages; upload is informational.
          fail_ci_if_error: false
          verbose: true
