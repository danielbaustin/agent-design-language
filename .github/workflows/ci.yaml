name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  adl-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adl
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: path-policy
        run: |
          bash adl/tools/ci_path_policy.sh \
            --event-name "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --ref "${{ github.ref }}" \
            --github-output "$GITHUB_OUTPUT"
        working-directory: .

      - name: Install Rust toolchain
        if: steps.path-policy.outputs.rust_required == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Rust cache
        if: steps.path-policy.outputs.rust_required == 'true'
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            adl -> target
          cache-directories: |
            ~/.cache/sccache

      - name: Install sccache
        if: steps.path-policy.outputs.rust_required == 'true'
        uses: taiki-e/install-action@e5c52b603cc5f5e9b52b6a43afad8e9fe0527090 # install-action
        with:
          tool: sccache

      - name: Install lld
        if: steps.path-policy.outputs.rust_required == 'true'
        run: |
          if ! command -v ld.lld >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y lld
          fi
          command -v ld.lld

      - name: Configure Rust acceleration
        if: steps.path-policy.outputs.rust_required == 'true'
        run: |
          mkdir -p "$HOME/.cache/sccache"
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=2G" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          if ! command -v ld.lld >/dev/null 2>&1; then
            echo "::error::ld.lld is unavailable after the install step"
            exit 1
          fi
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=lld" >> "$GITHUB_ENV"
          echo "RUST_LINK_ACCEL=lld" >> "$GITHUB_ENV"
          sccache --zero-stats || true

      - name: tooling sanity (bash -n)
        run: bash -n adl/tools/*.sh
        working-directory: .

      - name: tooling sanity (codex_pr help)
        run: sh adl/tools/codex_pr.sh --help
        working-directory: .

      - name: tooling sanity (codexw help)
        run: sh adl/tools/codexw.sh --help
        working-directory: .

      - name: coverage-impact preflight contract
        run: bash adl/tools/test_check_coverage_impact.sh
        working-directory: .

      - name: path-policy PR-fast coverage contract
        run: bash adl/tools/test_ci_path_policy.sh
        working-directory: .

      - name: guardrail (no new legacy refs)
        run: bash adl/tools/check_no_new_legacy_swarm_refs.sh
        working-directory: .

      - name: guardrail (issue PR closing linkage)
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash adl/tools/check_pr_closing_linkage.sh
        working-directory: .

      - name: repo-code-review contract check
        run: bash adl/tools/test_repo_code_review_skill_contracts.sh
        working-directory: .

      - name: test-generator contract check
        run: bash adl/tools/test_test_generator_skill_contracts.sh
        working-directory: .

      - name: demo-operator contract check
        run: bash adl/tools/test_demo_operator_skill_contracts.sh
        working-directory: .

      - name: arxiv-paper-writer contract check
        run: bash adl/tools/test_arxiv_paper_writer_skill_contracts.sh
        working-directory: .

      - name: fmt
        if: steps.path-policy.outputs.rust_required == 'true'
        run: cargo fmt --all -- --check

      - name: clippy
        if: steps.path-policy.outputs.rust_required == 'true'
        run: cargo clippy --all-targets -- -D warnings

      - name: docs command check
        run: bash tools/check_release_notes_commands.sh

      - name: ci runtime contract check
        run: bash tools/test_ci_runtime_contracts.sh

      - name: ci cache/linker contract check
        run: bash tools/test_ci_cache_linker_contracts.sh

      - name: release version truth check
        if: steps.path-policy.outputs.release_version_only == 'true'
        run: bash adl/tools/check_release_version_surfaces.sh
        working-directory: .

      - name: Install cargo-nextest
        if: steps.path-policy.outputs.rust_required == 'true' && steps.path-policy.outputs.full_coverage_required != 'true'
        uses: taiki-e/install-action@e5c52b603cc5f5e9b52b6a43afad8e9fe0527090 # install-action
        with:
          tool: nextest

      - name: test
        if: steps.path-policy.outputs.rust_required == 'true' && steps.path-policy.outputs.full_coverage_required != 'true'
        run: cargo nextest run --status-level all --final-status-level slow

      - name: doc test
        if: steps.path-policy.outputs.rust_required == 'true' && steps.path-policy.outputs.full_coverage_required != 'true'
        run: cargo test --doc

      - name: test covered by full coverage lane
        if: steps.path-policy.outputs.rust_required == 'true' && steps.path-policy.outputs.full_coverage_required == 'true'
        run: |
          echo "Skipping standalone cargo nextest/doc-test lane because this event requires the full cargo-llvm-cov lane."
          echo "Policy reason: ${{ steps.path-policy.outputs.reason }}"
          echo "Coverage lane: ${{ steps.path-policy.outputs.coverage_lane }}"
          echo "Coverage authority: ${{ steps.path-policy.outputs.coverage_authority }}"

      - name: release-version Rust lane replacement
        if: steps.path-policy.outputs.release_version_only == 'true'
        run: |
          echo "Ordinary Rust fmt/clippy/test is replaced by the bounded release-version truth check for this PR."
          echo "Policy reason: ${{ steps.path-policy.outputs.reason }}"
          echo "Coverage lane: ${{ steps.path-policy.outputs.coverage_lane }}"
          echo "Coverage authority: ${{ steps.path-policy.outputs.coverage_authority }}"
        working-directory: .

      - name: Rust validation skipped by path policy
        if: steps.path-policy.outputs.rust_required != 'true' && steps.path-policy.outputs.release_version_only != 'true'
        run: |
          echo "Rust fmt/clippy/test skipped because changed paths do not touch Rust runtime or test surfaces."
          echo "Policy reason: ${{ steps.path-policy.outputs.reason }}"
          echo "Coverage lane: ${{ steps.path-policy.outputs.coverage_lane }}"
          echo "Coverage authority: ${{ steps.path-policy.outputs.coverage_authority }}"
        working-directory: .

      - name: demo smoke (S-01..S-05)
        if: steps.path-policy.outputs.demo_smoke_required == 'true'
        run: bash adl/tools/demo_smoke_v07_story.sh
        working-directory: .

      - name: Demo smoke skipped by path policy
        if: steps.path-policy.outputs.demo_smoke_required != 'true'
        run: |
          echo "Demo smoke skipped because changed paths do not touch runtime or demo surfaces."
          echo "Policy reason: ${{ steps.path-policy.outputs.reason }}"
        working-directory: .

      - name: Rust acceleration stats
        if: always() && steps.path-policy.outputs.rust_required == 'true'
        run: |
          echo "Linker mode: ${RUST_LINK_ACCEL:-unknown}"
          sccache --show-stats || true

  adl-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: adl
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: path-policy
        run: |
          bash adl/tools/ci_path_policy.sh \
            --event-name "${{ github.event_name }}" \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --ref "${{ github.ref }}" \
            --github-output "$GITHUB_OUTPUT"
        working-directory: .

      - name: Determine PR fast coverage filters
        id: coverage-impact
        if: github.event_name == 'pull_request' && steps.path-policy.outputs.coverage_required == 'true' && steps.path-policy.outputs.full_coverage_required != 'true'
        run: |
          set -euo pipefail
          bash adl/tools/check_coverage_impact.sh \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --print-risk-filters > adl/coverage-impact-filters.txt
          if test -s adl/coverage-impact-filters.txt; then
            echo "needs_fast_summary=true" >> "$GITHUB_OUTPUT"
            echo "filters=$(paste -sd' ' adl/coverage-impact-filters.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "needs_fast_summary=false" >> "$GITHUB_OUTPUT"
            echo "filters=" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - name: Install Rust toolchain
        if: steps.path-policy.outputs.full_coverage_required == 'true' || steps.coverage-impact.outputs.needs_fast_summary == 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools-preview

      - name: Rust cache
        if: steps.path-policy.outputs.full_coverage_required == 'true' || steps.coverage-impact.outputs.needs_fast_summary == 'true'
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            adl -> target
          cache-directories: |
            ~/.cache/sccache

      - name: Install cargo-llvm-cov
        if: steps.path-policy.outputs.full_coverage_required == 'true' || steps.coverage-impact.outputs.needs_fast_summary == 'true'
        uses: taiki-e/install-action@e5c52b603cc5f5e9b52b6a43afad8e9fe0527090 # cargo-llvm-cov

      - name: Install sccache for coverage
        if: steps.path-policy.outputs.full_coverage_required == 'true' || steps.coverage-impact.outputs.needs_fast_summary == 'true'
        uses: taiki-e/install-action@e5c52b603cc5f5e9b52b6a43afad8e9fe0527090 # install-action
        with:
          tool: sccache

      - name: Install lld for coverage
        if: steps.path-policy.outputs.full_coverage_required == 'true' || steps.coverage-impact.outputs.needs_fast_summary == 'true'
        run: |
          if ! command -v ld.lld >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y lld
          fi
          command -v ld.lld

      - name: Configure Rust acceleration for coverage
        if: steps.path-policy.outputs.full_coverage_required == 'true' || steps.coverage-impact.outputs.needs_fast_summary == 'true'
        run: |
          mkdir -p "$HOME/.cache/sccache"
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=2G" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          if ! command -v ld.lld >/dev/null 2>&1; then
            echo "::error::ld.lld is unavailable after the install step"
            exit 1
          fi
          echo "RUSTFLAGS=-C link-arg=-fuse-ld=lld" >> "$GITHUB_ENV"
          echo "RUST_LINK_ACCEL=lld" >> "$GITHUB_ENV"
          sccache --zero-stats || true

      - name: Install cargo-nextest for coverage
        if: steps.path-policy.outputs.full_coverage_required == 'true' || steps.coverage-impact.outputs.needs_fast_summary == 'true'
        uses: taiki-e/install-action@e5c52b603cc5f5e9b52b6a43afad8e9fe0527090 # install-action
        with:
          tool: nextest

      - name: Coverage run and summary (json)
        if: steps.path-policy.outputs.full_coverage_required == 'true'
        run: |
          cargo llvm-cov nextest --workspace --all-features --status-level all --final-status-level slow --no-report
          cargo llvm-cov report --json --summary-only --output-path coverage-summary.json

      - name: PR fast coverage summary (json)
        if: github.event_name == 'pull_request' && steps.path-policy.outputs.coverage_required == 'true' && steps.path-policy.outputs.full_coverage_required != 'true' && steps.coverage-impact.outputs.needs_fast_summary == 'true'
        run: |
          CARGO_INCREMENTAL=0 cargo llvm-cov nextest --workspace --all-features --status-level all --final-status-level slow --no-report -- ${{ steps.coverage-impact.outputs.filters }}
          cargo llvm-cov report --json --summary-only --output-path coverage-summary.json

      - name: Coverage-impact changed-source gate
        if: github.event_name == 'pull_request' && steps.path-policy.outputs.full_coverage_required == 'true'
        env:
          PER_FILE_LINE_THRESHOLD: "80"
        run: |
          bash adl/tools/check_coverage_impact.sh \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --summary adl/coverage-summary.json \
            --threshold "$PER_FILE_LINE_THRESHOLD"
        working-directory: .

      - name: PR coverage-impact preflight
        if: github.event_name == 'pull_request' && steps.path-policy.outputs.coverage_required == 'true' && steps.path-policy.outputs.full_coverage_required != 'true'
        env:
          PER_FILE_LINE_THRESHOLD: "80"
        run: |
          if [ "${{ steps.coverage-impact.outputs.needs_fast_summary }}" = "true" ]; then
            bash adl/tools/check_coverage_impact.sh \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}" \
              --summary adl/coverage-summary.json \
              --require-summary-for-risk \
              --threshold "$PER_FILE_LINE_THRESHOLD"
          else
            bash adl/tools/check_coverage_impact.sh \
              --base "${{ github.event.pull_request.base.sha }}" \
              --head "${{ github.event.pull_request.head.sha }}" \
              --require-summary-for-risk \
              --threshold "$PER_FILE_LINE_THRESHOLD"
          fi
        working-directory: .

      - name: Full coverage deferred by PR policy
        if: github.event_name == 'pull_request' && steps.path-policy.outputs.coverage_required == 'true' && steps.path-policy.outputs.full_coverage_required != 'true'
        run: |
          echo "Full cargo-llvm-cov is deferred for this PR to avoid duplicate full test execution."
          echo "This check ran the changed-source coverage-impact preflight instead."
          echo "Full coverage remains required on push-to-main, nightly coverage ratchet, and fail-closed classification."
          echo "Policy reason: ${{ steps.path-policy.outputs.reason }}"
          echo "Coverage lane: ${{ steps.path-policy.outputs.coverage_lane }}"
          echo "Coverage authority: ${{ steps.path-policy.outputs.coverage_authority }}"
        working-directory: .

      - name: Enforce coverage policy gates (workspace + per-file)
        if: steps.path-policy.outputs.full_coverage_required == 'true'
        env:
          WORKSPACE_LINE_THRESHOLD: "90"
          PER_FILE_LINE_THRESHOLD: "80"
        run: |
          set -eu
          bash tools/enforce_coverage_gates.sh coverage-summary.json

      - name: Coverage (ADL Rust workspace lcov)
        if: steps.path-policy.outputs.full_coverage_required == 'true'
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Coverage summary (text)
        if: steps.path-policy.outputs.full_coverage_required == 'true'
        run: cargo llvm-cov report --summary-only | tee coverage-summary.txt

      - name: Verify generated lcov file
        if: steps.path-policy.outputs.full_coverage_required == 'true'
        run: test -s lcov.info && ls -l lcov.info

      - name: Verify lcov path from repository root
        if: steps.path-policy.outputs.full_coverage_required == 'true'
        run: test -s adl/lcov.info && ls -l adl/lcov.info
        working-directory: .

      - name: Upload coverage artifact
        if: steps.path-policy.outputs.full_coverage_required == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adl-coverage-lcov
          path: |
            adl/lcov.info
            adl/coverage-summary.json
            adl/coverage-summary.txt
          if-no-files-found: error

      - name: Coverage skipped by path policy
        if: steps.path-policy.outputs.coverage_required != 'true'
        run: |
          echo "Coverage skipped because changed paths do not touch Rust runtime or test surfaces."
          echo "Policy reason: ${{ steps.path-policy.outputs.reason }}"
          echo "This keeps the adl-coverage check stable while avoiding full cargo-llvm-cov for docs/planning/tools-only PRs."
          echo "Coverage lane: ${{ steps.path-policy.outputs.coverage_lane }}"
          echo "Coverage authority: ${{ steps.path-policy.outputs.coverage_authority }}"
        working-directory: .

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.path-policy.outputs.full_coverage_required == 'true'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: adl/lcov.info
          flags: adl
          # Keep CI signal stable during transient Codecov outages; upload is informational.
          fail_ci_if_error: false
          verbose: true

      - name: Rust acceleration stats for coverage
        if: always() && (steps.path-policy.outputs.full_coverage_required == 'true' || steps.coverage-impact.outputs.needs_fast_summary == 'true')
        run: |
          echo "Linker mode: ${RUST_LINK_ACCEL:-unknown}"
          sccache --show-stats || true
