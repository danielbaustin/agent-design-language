version: "0.5"

providers:
  local:
    type: "ollama"
    config:
      model: "phi4-mini"

agents:
  trace_recorder:
    provider: "local"
    model: "phi4-mini"

tasks:
  transition_summary:
    prompt:
      user: "Transition {{issue}} concluded via {{proof_surface}}."

run:
  name: "csdlc-transition-trace-proof"
  workflow:
    kind: "sequential"
    steps:
      - id: "record.transition"
        agent: "trace_recorder"
        task: "transition_summary"
        inputs:
          issue: "3353"
          proof_surface: "software_development_polis"
