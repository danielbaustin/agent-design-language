milestone: v0.91.4
status: planned_issue_wave_not_open
issue_wave_opened: false
owner_issue: 3100
planning_source: docs/milestones/v0.91.4
tracked_package: docs/milestones/v0.91.4
depends_on:
  - docs/milestones/v0.91.3
notes:
  - v0.91.4 completes and hardens the Cognitive SDLC rollout.
  - v0.91.4 also carries the bounded CodeFriend pre-alpha repo/S3 welcome-page
    setup sidecar mini-sprint.
  - Issue numbers remain pending until seeded through the normal conductor
    lifecycle.
  - v0.91.4 should make C-SDLC the default path for future ADL
    software-development issues.
  - v0.91.4 must make Software Development Polis roles and actor standing
    explicit enough for repeated C-SDLC execution.
  - By milestone closeout, all durable C-SDLC truth must be tracked in Git.
  - Durable C-SDLC proof must include minimal signed trace bundles and ObsMem
    ingestion from tracked evidence.
  - Five-minute-sprint repeatability must include validation-tail and
    proof-latency measurement; short sprint timing cannot hide long blocking
    proof cycles.
  - Parallel Validation Fabric planning is in scope for v0.91.4 and must
    preserve truthful pending/deferred/blocking proof state.
  - CodeFriend sidecar work is product setup, not C-SDLC core proof.
card_update_rule:
  - Every opened WP must receive SIP, STP, SPP, SRP, and SOR cards.
  - Card edits must use editor skills.
  - SOR closeout must match GitHub issue/PR truth.
