      title: WP-01 opening gate
      seeded_issues: [3346]
      state: seeded_and_ready
    - batch: 1
      title: Sprint 1 lifecycle and routing hardening
      seeded_issues: [3347, 3348, 3349, 3350]
      state: seeded_and_ready
    - batch: 2
