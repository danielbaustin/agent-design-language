      seeded_issues: [3352, 3353, 3354, 3355, 3356]
      state: seeded_and_ready_waiting_on_wp_01
    - batch: 3
      title: Sprint 3 sprint default and metrics
      seeded_issues: [3357, 3358, 3359, 3360, 3361]
      state: seeded_and_ready_waiting_on_wp_01
    - batch: 4
