notes:
  - v0.91.3 is the first Cognitive SDLC implementation slice.
  - Issue numbers remain pending until the issue wave is created through the
    normal conductor lifecycle.
  - The milestone proves one bounded Cognitive State Transition, not full
    C-SDLC adoption.
  - v0.91.4 owns repeatable operation, hardening, enforcement, and default
    adoption.
card_update_rule:
  - Every opened WP must receive SIP, STP, SPP, SRP, and SOR cards.
  - SRP means Structured Review Prompt and must include review results before
    PR publication or an explicit pre-execution exception.
  - SOR must record final outcome truth after merge/closeout, not only branch
    execution truth.
