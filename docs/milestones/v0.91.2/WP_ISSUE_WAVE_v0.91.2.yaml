notes:
- v0.91.2 is the tooling, evaluation, productization, publication, and
  workflow-hardening pressure-release milestone.
- The UTS + ACC benchmark must distinguish ADL JSON proposal mode from
  provider-native tool/function-call mode.
- Runtime/test-cycle recovery must reduce wasted time without weakening
  authoritative proof.
- Workspace, modernization, and publication work must remain review-gated and
  non-silent.
card_update_rule:
- When opened, every WP must receive STP, SIP, SPP, and SOR cards from the
  accepted readiness section.
- Cards must name source docs, concrete outputs, validation commands, non-goals,
  demo/proof expectations, and review dependencies.
