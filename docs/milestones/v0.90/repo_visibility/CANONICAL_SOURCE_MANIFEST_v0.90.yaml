code_surfaces:
  current_runtime:
    - path: adl/src/long_lived_agent.rs
      role: long-lived agent spec, state root, lease, status, stop, cycle artifacts, continuity, memory index, provider binding records
    - path: adl/src/cli/agent_cmd.rs
      role: operator CLI for agent tick, run, status, and stop
  supporting_runtime:
    - path: adl/src/chronosense/continuity.rs
      role: existing continuity-related runtime surface
  current_tests:
    - path: adl/tests/cli_smoke/agent.rs
      role: CLI smoke proof for bounded cycles, status, continuity, ledger, memory index, provider binding history
  current_demos:
    - path: demos/v0.89.1/long_lived_stock_league_demo.md
      role: prior bounded stock-league proof narrative
    - path: adl/tools/demo_v0891_long_lived_stock_league.sh
      role: prior demo entrypoint
    - path: adl/tools/test_demo_v0891_long_lived_stock_league.sh
      role: prior demo validation entrypoint
    - path: demos/fixtures/long_lived_stock_league/market_fixture.json
      role: fixture market data for paper-only proof
    - path: demos/fixtures/long_lived_stock_league/model_roster_fixture.json
      role: deterministic model roster fixture

