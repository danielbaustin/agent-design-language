schema: adl.repo_visibility_manifest.v1
milestone: v0.90
issue: 2031
slice:
  id: v0.90-long-lived-runtime
  title: Long-lived runtime and stock-league proof slice
  authority: tracked milestone docs plus current repository source
  status: prototype_manifest
  non_goals:
    - full_repo_semantic_index
    - autonomous_release_approval
    - public_claims_from_local_adl_planning

authority_model:
  tracked_milestone_docs:
    meaning: Public milestone planning and execution truth.
    roots:
      - docs/milestones/v0.90
  feature_docs:
    meaning: Candidate executable contracts or proof surfaces for v0.90.
    roots:
      - docs/milestones/v0.90/features
  ideas:
    meaning: Background and later-band context; not shipped work unless promoted.
    roots:
      - docs/milestones/v0.90/ideas
  local_planning:
    meaning: Local operator planning, not public release truth.
    roots:
      - .adl/docs/TBD
      - .adl/docs/v0.*planning
  retired_material:
    meaning: Historical provenance only.
    roots:
      - .adl/docs/TBD/retired

canonical_docs:
  milestone_entrypoints:
    - path: docs/milestones/v0.90/README.md
      role: milestone_entrypoint
    - path: docs/milestones/v0.90/WBS_v0.90.md
      role: work_package_map
    - path: docs/milestones/v0.90/SPRINT_v0.90.md
      role: sprint_plan
    - path: docs/milestones/v0.90/WP_ISSUE_WAVE_v0.90.yaml
      role: issue_graph
    - path: docs/milestones/v0.90/WP_EXECUTION_READINESS_v0.90.md
      role: execution_gate
    - path: docs/milestones/v0.90/DEMO_MATRIX_v0.90.md
      role: proof_surface_index
  selected_feature_docs:
    - path: docs/milestones/v0.90/features/LONG_LIVED_AGENT_RUNTIME_FEATURE_SET.md
      claim: runtime package overview and sprint implementation slice
    - path: docs/milestones/v0.90/features/FEATURE_LONG_LIVED_SUPERVISOR_HEARTBEAT.md
      claim: supervisor tick/run/status/stop, heartbeat, lease, lifecycle
    - path: docs/milestones/v0.90/features/FEATURE_LONG_LIVED_AGENT_CYCLE_CONTRACT.md
      claim: per-cycle observe/decide/persist artifact contract
    - path: docs/milestones/v0.90/features/FEATURE_LONG_LIVED_STATE_AND_CONTINUITY.md
      claim: pre-v0.92 continuity handle and state ledger boundary
    - path: docs/milestones/v0.90/features/FEATURE_LONG_LIVED_OPERATOR_CONTROL_AND_SAFETY.md
      claim: operator authority, stop controls, guardrails, failure policy
    - path: docs/milestones/v0.90/features/LONG_LIVED_STOCK_PICKING_AGENTS_DEMO_PLAN.md
      claim: bounded stock-league proof design

