milestone: v0.91.1
status: candidate_issue_wave
issue_wave_opened: false
owner_issue: null
planning_source: docs/milestones/v0.91.1
tracked_package: docs/milestones/v0.91.1
notes:
- v0.91.1 is the inhabited-runtime readiness milestone between v0.91 moral
  governance and v0.92 identity/birthday work.
- The hard exit criterion is an observatory-visible agent-shaped runtime proof
  inside the CSM/polis boundary.
- ACIP/A2A work remains local, authenticated, traceable, redacted, and
  external-TLS-gated.
- v0.92 owns the first true birthday; v0.91.1 prepares evidence but must not
  claim birth.
card_update_rule:
- When opened, every WP must receive STP, SIP, SOR, and SPP cards from the
  accepted readiness section.
- Cards must name source docs, concrete outputs, validation commands, non-goals,
  demo/proof expectations, and review dependencies.
closeout_sequence:
- WP-15 Observatory-visible agent flagship demo
- WP-16 Demo matrix and proof coverage
- WP-17 Coverage / quality gate
- WP-18 Docs + review pass
- WP-19 Internal review
- WP-20 External / 3rd-party review
- WP-21 Review findings remediation
- WP-22 v0.92 birthday readiness handoff
- WP-23 Release ceremony
